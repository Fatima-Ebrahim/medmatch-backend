services:
  - type: web
    name: medmatch-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medmatch-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
databases:
  - name: medmatch-db
    plan: free